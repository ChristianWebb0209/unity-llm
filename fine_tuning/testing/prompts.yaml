# Test prompts for Unity Composer vs GPT-4.1-mini (RAG) comparison.
# Run: python -m testing.run (from fine_tuning) or python testing/run.py
# Each prompt is sent to both backends; results are saved for qualitative and quantitative comparison.

prompts:
  - id: explain_ui_event
    question: "How do I wire a Unity UI Button onClick to a C# method using UnityEvent?"
    category: explain

  - id: connect_ui_event_in_scene
    question: "Open the current scene and connect a Button's onClick to an existing method in a C# script."
    category: code_gen

  - id: create_mono_behaviour_script
    question: "Create a simple C# MonoBehaviour script that updates a UI Text with a timestamp every second."
    category: code_gen

  - id: fix_csharp_compile_errors
    question: "I have a C# compile error. How do I interpret it and fix common missing-using / type-mismatch issues?"
    category: debug

  - id: inspector_binding
    question: "How do I expose a serialized field in Unity so it appears in the Inspector and can be assigned?"
    category: explain

  - id: scene_tree_modification
    question: "How do I create a GameObject and add a component to it at editor time (tool/editor script)?"
    category: explain

  - id: set_component_property
    question: "How do I programmatically set the text of a UnityEngine.UI.Text component?"
    category: explain

  - id: basic_lifecycle
    question: "When should I use Start vs Update vs OnEnable in Unity, and what do they mean?"
    category: explain

