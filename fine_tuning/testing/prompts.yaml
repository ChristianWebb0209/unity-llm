# Test prompts for Godot Composer vs GPT-4.1-mini (RAG) comparison.
# Run: python -m testing.run (from fine_tuning) or python testing/run.py
# Each prompt is sent to both backends; results are saved for qualitative and quantitative comparison.

prompts:
  - id: explain_signal
    question: "How do I connect a button's pressed signal to a method in GDScript?"
    category: explain

  - id: create_character_body
    question: "Create a simple CharacterBody2D script that moves left and right with the arrow keys."
    category: code_gen

  - id: fix_parse_error
    question: "What does 'Parser Error: Expected identifier' mean in GDScript and how do I fix it?"
    category: debug

  - id: add_child_node
    question: "How do I add a child node from code and add it to the scene tree?"
    category: explain

  - id: scene_tree_ready
    question: "Write a short script that runs when the node enters the scene tree (ready callback)."
    category: code_gen

  - id: get_node_reference
    question: "What's the best way to get a reference to another node in the scene from my script?"
    category: explain

  - id: simple_timer
    question: "I need a one-shot timer that calls a function after 2 seconds. How do I do that?"
    category: code_gen

  - id: resource_preload
    question: "How do I preload a scene or script as a constant in GDScript?"
    category: explain

  - id: vector2_movement
    question: "Give me a minimal example of moving a Node2D using velocity and delta in _process."
    category: code_gen

  - id: error_null_ref
    question: "I get 'Invalid get index on null' - what does that mean and how do I avoid it?"
    category: debug

  - id: export_var
    question: "How do I export a variable so it shows up in the Godot inspector?"
    category: explain

  - id: emit_signal
    question: "How do I define and emit a custom signal from my script?"
    category: code_gen

  - id: group_nodes
    question: "How can I get all nodes in a group (e.g. 'enemies') from code?"
    category: explain

  - id: input_single_press
    question: "How do I detect a single key press (not held) in _input or _unhandled_input?"
    category: code_gen

  - id: animate_sprite
    question: "What's a simple way to animate a Sprite2D's frames (AnimationPlayer vs manual)?"
    category: explain
